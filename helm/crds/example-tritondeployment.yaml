# Sample TritonDeployment — copy, adjust, and `kubectl apply -f`.
apiVersion: tarn.varga.io/v1alpha1
kind: TritonDeployment
metadata:
  name: llama-3-70b
  namespace: default
spec:
  image: nvcr.io/nvidia/tritonserver:24.09-py3
  modelRepository: s3://my-bucket/models
  replicas: 3
  tensorParallelism: 2
  pipelineParallelism: 1
  accelerator:
    type: nvidia_gpu
    count: 1
  resources:
    memory: 64Gi
    cpu: "16"
  openaiProxy:
    enabled: true
    port: 9000
  scaling:
    mode: composite
    minReplicas: 2
    maxReplicas: 10
    upThreshold: 0.75
    downThreshold: 0.20
  ranger:
    serviceName: triton_prod
    strict: true
  quotasRef:
    configMapName: tarn-quotas
    key: quotas.json
  env:
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://collector.observability:4317
