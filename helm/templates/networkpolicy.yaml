{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tarn.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tarn.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tarn.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- if .Values.networkPolicy.ingressNamespaceSelector }}
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 12 }}
        {{- else }}
        # Default: allow in-namespace traffic only.
        - podSelector: {}
        {{- end }}
      ports:
        - port: http
          protocol: TCP
        {{- if .Values.config.openaiProxyEnabled }}
        - port: openai
          protocol: TCP
        {{- end }}
  egress:
    # Permissive egress — TARN needs to talk to YARN RM, ZK, Ranger, Triton, HDFS, OTLP.
    # Tighten per-cluster by copying this chart and restricting to specific CIDRs.
    - {}
{{- end }}
