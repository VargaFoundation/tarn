# Sample log4j 1.x (reload4j) config that emits JSON via TarnJsonLayout.
# Activate by passing -Dlog4j.configuration=log4j-json.properties to the AM JVM
# (or place this file on the classpath and point YARN's log4j config to it).

log4j.rootLogger=INFO, tarnJson

log4j.appender.tarnJson=org.apache.log4j.ConsoleAppender
log4j.appender.tarnJson.Target=System.out
log4j.appender.tarnJson.layout=varga.tarn.yarn.logging.TarnJsonLayout

# Tame verbose Hadoop loggers. Raise these to TRACE when you really need them.
log4j.logger.org.apache.hadoop=WARN
log4j.logger.org.apache.zookeeper=WARN
log4j.logger.org.apache.curator=WARN
log4j.logger.org.apache.ranger=WARN

# Keep the TARN namespace chatty by default — our own code is what operators want to see.
log4j.logger.varga.tarn=INFO
