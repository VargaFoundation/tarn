name: Build and Push Tarn

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - 'helm/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - 'helm/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/tarn
  CHART_REGISTRY: ghcr.io/${{ github.repository_owner }}/charts

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests -B

      - name: Run tests (with JaCoCo coverage)
        run: ./mvnw test -B

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      - name: SpotBugs static analysis
        run: ./mvnw spotbugs:check -B
        continue-on-error: true

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: target/spotbugsXml.xml
          retention-days: 14

      # --- Docker image ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image (load locally for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: tarn:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: 'tarn:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif
          retention-days: 14

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Helm chart validation ---
      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint helm/

      - name: Helm template (default values)
        run: helm template tarn helm/ --namespace tarn > /tmp/helm-default.yaml

      - name: Helm template (full features)
        # All optional features on at once — catches rendering errors that are hidden when
        # a flag defaults to off. TLS, OpenAI proxy, Operator, ServiceMonitor, Ingress,
        # NetworkPolicy, PDB: if any template misnames a value, this fails.
        run: |
          helm template tarn helm/ --namespace tarn \
            --set config.tlsEnabled=true --set config.tlsKeystorePath=hdfs:///tls/keystore.jks \
            --set config.openaiProxyEnabled=true \
            --set operator.enabled=true \
            --set serviceMonitor.enabled=true \
            --set ingress.enabled=true --set ingress.hosts[0].host=tarn.example.com \
            --set ingress.hosts[0].paths[0].path=/ --set ingress.hosts[0].paths[0].pathType=Prefix \
            --set networkPolicy.enabled=true \
            --set podDisruptionBudget.enabled=true \
            > /tmp/helm-full.yaml

      - name: Upload rendered manifests (diagnostic artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: helm-rendered
          path: |
            /tmp/helm-default.yaml
            /tmp/helm-full.yaml
          retention-days: 7

      # --- Helm chart OCI publish (skipped on PRs) ---
      - name: Set up Helm for publish
        if: github.event_name != 'pull_request'
        uses: azure/setup-helm@v4

      - name: Log in Helm to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Package Helm chart
        if: github.event_name != 'pull_request'
        run: helm package helm/

      - name: Push Helm chart to GHCR
        if: github.event_name != 'pull_request'
        run: helm push tarn-*.tgz oci://${{ env.CHART_REGISTRY }}
